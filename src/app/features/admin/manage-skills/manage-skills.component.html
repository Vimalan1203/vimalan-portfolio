<div class="section-wrapper">
  <div class="page-header">
    <div>
      <div class="section-label">Admin → Skills</div>
      <h2 class="section-title">Manage Skills</h2>
    </div>
    <button mat-raised-button color="primary" (click)="openAdd()">
      <mat-icon>add</mat-icon> Add Skill
    </button>
  </div>
  <div class="divider"></div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search skills…</mat-label>
    <input matInput (input)="applyFilter($event)"/>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" class="data-table">
      <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let s" class="icon-cell">{{ s.icon }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Skill</th>
        <td mat-cell *matCellDef="let s"><strong>{{ s.name }}</strong></td>
      </ng-container>
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let s"><span class="tag">{{ s.category }}</span></td>
      </ng-container>
      <ng-container matColumnDef="proficiency">
        <th mat-header-cell *matHeaderCellDef>Proficiency</th>
        <td mat-cell *matCellDef="let s">
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" [style.width.%]="s.proficiency"></div></div>
            <span class="pct">{{ s.proficiency }}%</span>
          </div>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" (click)="openEdit(s)" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn"    (click)="delete(s)"   matTooltip="Delete"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">No skills found.</td>
      </tr>
    </table>
  </div>
</div>
