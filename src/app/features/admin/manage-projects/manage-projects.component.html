<div class="section-wrapper">
  <div class="page-header">
    <div>
      <div class="section-label">Admin → Projects</div>
      <h2 class="section-title">Manage Projects</h2>
    </div>
    <button mat-raised-button color="primary" (click)="openAdd()">
      <mat-icon>add</mat-icon> Add Project
    </button>
  </div>
  <div class="divider"></div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search projects…</mat-label>
    <input matInput (input)="applyFilter($event)"/>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0 data-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let p">{{ p.title }}</td>
      </ng-container>
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let p"><span class="tag">{{ p.category }}</span></td>
      </ng-container>
      <ng-container matColumnDef="duration">
        <th mat-header-cell *matHeaderCellDef>Duration</th>
        <td mat-cell *matCellDef="let p">{{ p.duration || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="techStack">
        <th mat-header-cell *matHeaderCellDef>Tech Stack</th>
        <td mat-cell *matCellDef="let p">
          <span class="tag" *ngFor="let t of p.techStack.slice(0,3)">{{ t }}</span>
          <span *ngIf="p.techStack.length > 3" class="more">+{{ p.techStack.length - 3 }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button color="primary" (click)="openEdit(p)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(p)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">No projects found.</td>
      </tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10]" showFirstLastButtons></mat-paginator>
  </div>
</div>
