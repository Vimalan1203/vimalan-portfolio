<div class="login-wrapper">
  <mat-card class="login-card">
    <div class="login-icon"><mat-icon>lock</mat-icon></div>
    <h2>Admin Login</h2>
    <p class="hint">Default: vimalan / Admin&#64;2025</p>

    <mat-error *ngIf="error" class="error-msg">{{ error }}</mat-error>

    <form [formGroup]="form" (ngSubmit)="login()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username"/>
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'"/>
        <button mat-icon-button matSuffix type="button" (click)="hidePassword=!hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" class="login-btn" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="20" class="inline-spinner"></mat-spinner>
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </mat-card>
</div>
